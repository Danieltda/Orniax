  <!-- ══ GEOMETRIC ACCENTS (hexagons, triangles) ══ -->
  <g mask="url(#cornerMaskLight)" opacity="0.20" stroke="#1A5C5A" fill="none" stroke-width="0.8">
    <!-- Bottom-left hexagon -->
    <polygon points="120,1000 140,988 160,1000 160,1020 140,1032 120,1020"/>
    <!-- Smaller nested -->
    <polygon points="130,1004 140,998 150,1004 150,1016 140,1022 130,1016" stroke-width="0.5"/>

