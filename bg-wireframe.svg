    <circle cx="220" cy="910" r="2.2"/>
    <circle cx="180" cy="980" r="1.5"/>
    <circle cx="300" cy="870" r="2"/>
    <circle cx="280" cy="950" r="1.8"/>
    <circle cx="350" cy="920" r="1.5"/>
    <circle cx="50" cy="850" r="1.5"/>
    <circle cx="160" cy="830" r="1.8"/>
