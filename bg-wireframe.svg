  <g mask="url(#cornerMask)" opacity="0.30" stroke="#1A5C5A" fill="none" stroke-width="1">
    <!-- Bottom-left waves -->
    <path d="M0,900 Q200,850 350,870 T600,820 T800,860" stroke-width="1.2"/>
    <path d="M0,940 Q180,890 320,920 T580,870 T750,910" stroke-width="0.9"/>
    <path d="M0,980 Q160,940 300,960 T550,920 T700,950" stroke-width="0.7"/>

    <!-- Top-right waves -->
    <path d="M1920,180 Q1720,150 1570,170 T1320,140 T1120,180" stroke-width="1.2"/>
    <path d="M1920,130 Q1740,100 1600,120 T1370,90 T1170,130" stroke-width="0.9"/>
    <path d="M1920,80 Q1760,55 1630,70 T1420,45 T1220,80" stroke-width="0.7"/>

    <!-- Bottom-right waves -->
    <path d="M1920,920 Q1750,880 1600,900 T1380,870 T1200,910" stroke-width="1"/>
    <path d="M1920,960 Q1770,930 1640,945 T1430,920 T1260,950" stroke-width="0.7"/>

    <!-- Top-left subtle wave -->
    <path d="M0,150 Q200,120 380,140 T600,110 T780,145" stroke-width="0.8"/>
    <path d="M0,100 Q180,75 340,90 T560,65 T720,95" stroke-width="0.6"/>
  </g>

