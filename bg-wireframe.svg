    <line x1="50" y1="850" x2="160" y2="830" stroke-width="0.4" fill="none"/>
    <line x1="160" y1="830" x2="300" y2="870" stroke-width="0.3" fill="none"/>

    <!-- Top-right mesh -->
    <circle cx="1860" cy="80" r="2.5"/>
    <circle cx="1780" cy="120" r="2"/>
    <circle cx="1820" cy="50" r="1.8"/>
    <circle cx="1700" cy="90" r="2.2"/>
    <circle cx="1740" cy="30" r="1.5"/>
    <circle cx="1620" cy="130" r="2"/>
    <circle cx="1650" cy="60" r="1.8"/>
    <circle cx="1560" cy="100" r="1.5"/>
    <circle cx="1870" cy="160" r="1.5"/>
    <circle cx="1760" cy="180" r="1.8"/>
    <line x1="1860" y1="80" x2="1780" y2="120" stroke-width="0.5" fill="none"/>
    <line x1="1780" y1="120" x2="1700" y2="90" stroke-width="0.5" fill="none"/>
    <line x1="1820" y1="50" x2="1740" y2="30" stroke-width="0.5" fill="none"/>
    <line x1="1700" y1="90" x2="1620" y2="130" stroke-width="0.5" fill="none"/>
    <line x1="1860" y1="80" x2="1820" y2="50" stroke-width="0.4" fill="none"/>
    <line x1="1780" y1="120" x2="1820" y2="50" stroke-width="0.4" fill="none"/>
    <line x1="1700" y1="90" x2="1650" y2="60" stroke-width="0.4" fill="none"/>
    <line x1="1620" y1="130" x2="1560" y2="100" stroke-width="0.4" fill="none"/>
    <line x1="1650" y1="60" x2="1560" y2="100" stroke-width="0.4" fill="none"/>
    <line x1="1870" y1="160" x2="1860" y2="80" stroke-width="0.4" fill="none"/>
    <line x1="1870" y1="160" x2="1780" y2="120" stroke-width="0.3" fill="none"/>
    <line x1="1870" y1="160" x2="1760" y2="180" stroke-width="0.4" fill="none"/>
    <line x1="1760" y1="180" x2="1620" y2="130" stroke-width="0.3" fill="none"/>

    <!-- Bottom-right mesh -->
    <circle cx="1850" cy="950" r="2"/>
    <circle cx="1770" cy="920" r="2.2"/>
    <circle cx="1810" cy="990" r="1.5"/>
    <circle cx="1690" cy="960" r="1.8"/>
    <circle cx="1730" cy="1010" r="1.5"/>
