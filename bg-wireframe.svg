    <circle cx="100" cy="1010" r="2.2"/><circle cx="125" cy="1022" r="2"/><circle cx="150" cy="1008" r="1.8"/>
    <circle cx="20" cy="990" r="3"/><circle cx="45" cy="985" r="2.5"/><circle cx="70" cy="995" r="2"/>
    <circle cx="95" cy="982" r="1.8"/><circle cx="120" cy="992" r="1.5"/>
    <circle cx="15" cy="960" r="2.5"/><circle cx="40" cy="955" r="2"/><circle cx="65" cy="965" r="1.5"/>
    <circle cx="180" cy="1048" r="2"/><circle cx="205" cy="1042" r="1.8"/><circle cx="230" cy="1052" r="1.5"/>
    <circle cx="175" cy="1018" r="1.5"/><circle cx="200" cy="1012" r="1.2"/>

    <!-- Top-right halftone cluster -->
    <circle cx="1890" cy="30" r="4"/><circle cx="1865" cy="35" r="3.5"/><circle cx="1840" cy="25" r="3"/>
    <circle cx="1815" cy="40" r="2.8"/><circle cx="1790" cy="30" r="2.5"/><circle cx="1765" cy="42" r="2.2"/>
    <circle cx="1895" cy="60" r="3.5"/><circle cx="1870" cy="65" r="3"/><circle cx="1845" cy="55" r="2.5"/>
    <circle cx="1820" cy="68" r="2.2"/><circle cx="1795" cy="58" r="2"/><circle cx="1770" cy="70" r="1.8"/>
    <circle cx="1900" cy="90" r="3"/><circle cx="1875" cy="95" r="2.5"/><circle cx="1850" cy="85" r="2"/>
    <circle cx="1825" cy="98" r="1.8"/><circle cx="1800" cy="88" r="1.5"/>
    <circle cx="1905" cy="120" r="2.5"/><circle cx="1880" cy="125" r="2"/><circle cx="1855" cy="115" r="1.5"/>
    <circle cx="1740" cy="32" r="2"/><circle cx="1715" cy="38" r="1.8"/><circle cx="1690" cy="28" r="1.5"/>

