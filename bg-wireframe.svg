<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Radial mask: visible in corners, transparent in center -->
    <radialGradient id="centerFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="25%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </radialGradient>
    <mask id="cornerMask">
      <rect width="1920" height="1080" fill="url(#centerFade)"/>
    </mask>

    <!-- Lighter mask for subtle elements -->
    <radialGradient id="centerFadeLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.85"/>
    </radialGradient>
    <mask id="cornerMaskLight">
      <rect width="1920" height="1080" fill="url(#centerFadeLight)"/>
    </mask>
  </defs>

  <g mask="url(#cornerMask)" opacity="0.35" stroke="#1A5C5A" fill="none">
    <!-- ══ BOTTOM-LEFT: Perspective grid ══ -->
    <!-- Horizontal perspective lines -->
    <line x1="0" y1="1080" x2="600" y2="780" stroke-width="0.8"/>
    <line x1="0" y1="1020" x2="550" y2="750" stroke-width="0.7"/>
    <line x1="0" y1="960" x2="500" y2="720" stroke-width="0.6"/>
    <line x1="0" y1="900" x2="450" y2="690" stroke-width="0.5"/>
    <line x1="0" y1="840" x2="400" y2="660" stroke-width="0.4"/>
    <line x1="0" y1="780" x2="350" y2="630" stroke-width="0.3"/>

    <!-- Vertical perspective lines from bottom-left -->
    <line x1="0" y1="1080" x2="200" y2="650" stroke-width="0.8"/>
    <line x1="80" y1="1080" x2="260" y2="670" stroke-width="0.7"/>
    <line x1="160" y1="1080" x2="320" y2="690" stroke-width="0.6"/>
    <line x1="240" y1="1080" x2="380" y2="710" stroke-width="0.5"/>
    <line x1="320" y1="1080" x2="440" y2="730" stroke-width="0.4"/>
    <line x1="400" y1="1080" x2="500" y2="750" stroke-width="0.3"/>

    <!-- ══ TOP-RIGHT: Perspective grid ══ -->
    <line x1="1920" y1="0" x2="1320" y2="300" stroke-width="0.8"/>
    <line x1="1920" y1="60" x2="1370" y2="330" stroke-width="0.7"/>
    <line x1="1920" y1="120" x2="1420" y2="360" stroke-width="0.6"/>
    <line x1="1920" y1="180" x2="1470" y2="390" stroke-width="0.5"/>
    <line x1="1920" y1="240" x2="1520" y2="420" stroke-width="0.4"/>

    <line x1="1920" y1="0" x2="1720" y2="430" stroke-width="0.8"/>
    <line x1="1840" y1="0" x2="1660" y2="410" stroke-width="0.7"/>
    <line x1="1760" y1="0" x2="1600" y2="390" stroke-width="0.6"/>
    <line x1="1680" y1="0" x2="1540" y2="370" stroke-width="0.5"/>
    <line x1="1600" y1="0" x2="1480" y2="350" stroke-width="0.4"/>

    <!-- ══ BOTTOM-RIGHT: Perspective grid ══ -->
    <line x1="1920" y1="1080" x2="1400" y2="800" stroke-width="0.7"/>
    <line x1="1920" y1="1020" x2="1450" y2="780" stroke-width="0.6"/>
    <line x1="1920" y1="960" x2="1500" y2="760" stroke-width="0.5"/>
    <line x1="1920" y1="900" x2="1550" y2="740" stroke-width="0.4"/>

    <line x1="1920" y1="1080" x2="1750" y2="680" stroke-width="0.7"/>
    <line x1="1820" y1="1080" x2="1680" y2="710" stroke-width="0.6"/>
    <line x1="1720" y1="1080" x2="1610" y2="740" stroke-width="0.5"/>
    <line x1="1620" y1="1080" x2="1540" y2="770" stroke-width="0.4"/>
  </g>

