    <polygon points="1520,50 1530,30 1540,50" stroke-width="0.5"/>
    <polygon points="1700,980 1710,965 1720,980" stroke-width="0.5"/>
    <polygon points="80,120 90,100 100,120" stroke-width="0.5"/>

